name: Release
on:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attach turbomem.mcpb to the @turbomem/mcp release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          MCP_VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "@turbomem/mcp") | .version')
          if [ -z "$MCP_VERSION" ]; then
            echo "@turbomem/mcp was not published in this run; skipping .mcpb upload."
            exit 0
          fi
          echo "Packing @turbomem/mcp@$MCP_VERSION..."
          pnpm --filter @turbomem/mcp pack:mcpb
          gh release upload "@turbomem/mcp@$MCP_VERSION" packages/mcp/turbomem.mcpb --clobber
